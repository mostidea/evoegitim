fastcgi_cache_path /etc/nginx/cache levels=1:2 keys_zone=WP:100m inactive=60m;
fastcgi_cache_key "$scheme$request_method$host$request_uri";
limit_req_zone $binary_remote_addr zone=WPRATELIMIT:10m rate=10r/s;
##############################
#NGINX CONFIG
server {

#######################

        #Nginx https redirect configuration
        listen 80;
        server_name evoegitim.com www.evoegitim.com;
        return 301 https://$host$request_uri;

}

#######################

server {

        #Nginx default configuration
        listen       443 ssl http2;
        listen       [::]:443 ssl http2;
        server_name  evoegitim.com www.evoegitim.com;
        root         /var/www/evoegitim/public;
        index        index.html index.php index.htm;
        ssl_certificate "/etc/nginx/ssl/evoegitim.crt";
        ssl_certificate_key "/etc/nginx/ssl/evoegitim.key";
        ssl_session_cache shared:SSL:1m;
        ssl_prefer_server_ciphers on;
	ssl_session_timeout 5m;

#######################

        #Nginx redirect and deny configuration
        
        location / {
        try_files $uri $uri/ @rewrite;
        }

        location @rewrite {
        rewrite ^/blog/([a-z0-9-]+)/?$ /blog-details.php?slug=$1 last;
        rewrite ^/grup-detay/([a-z0-9-]+)/?$ /grupdetay.php?slug=$1 last;
        rewrite ^/ogretmen/([a-z0-9-]+)/?$ /team-details.php?name=$1 last;
        rewrite ^/duyuru/([a-z0-9-]+)/?$ /duyuru.php?slug=$1 last;
        rewrite ^/uzman-ogretmenler/?$ /team.php last;
        rewrite ^/is-birlikleri/?$ /referanslarimiz.php last;
        rewrite ^/neden-evo/?$ /neden-evo.php last;
        rewrite ^/ozel-egitim-koclugu/?$ /kocluk.php last;
        rewrite ^/online-egitim-gruplari/?$ /grup.php last;
        rewrite ^/sikca-sorulan-sorular/?$ /faq.php last;
        rewrite ^/evo-arge/?$ /evoarge.php last;
        rewrite ^/bloglar/?$ /blog.php last;
        rewrite ^/hakkimizda/?$ /about.php last;
        rewrite ^/iletisim/?$ /contact.php last;
        rewrite ^/duyurular/?$ /duyurular.php last;
        rewrite ^/([^.]+)/?$ /$1.php last;
        rewrite ^/duyuru/([^/]*)$ /duyuru-detay.php?duyuru=$1 last;

        return 404;
        }

        location ~ ^[^.?]+[^/]$ {
        return 301 https://evoegitim.com$request_uri/;
        }

       #---Nginx redirect configuration end---#

       #----Rules-SECURITY----#

	location ~* .(pl|cgi|py|sh|lua|asp)$ {
		return 444;
	}
	location ~* ^.+.(ogg|js|css|ogv|svg|svgz|eot|otf|woff|mp4|ttf|rss|atom|jpg|jpeg|gif|png|ico|zip|tgz|gz|rar|bz2|doc|xls|exe|ppt|tar|mid|midi|wav|bmp|rtf)$ {
		access_log off;
		log_not_found off;
		expires max;
	}
	location ~* .(pl|cgi|py|sh|lua|asp)$ {
		return 444;
	}
        location ~* \.(sh|bash|sql|bak|log|inc|env|yml|yaml|ini)$ {
                deny all;
        }
	location ~* ^.+\.(bak|log|old|orig|original|php#|php~|php_bak|save|swo|swp|sql)$ {
		deny all;
		access_log off;
		log_not_found off;
	}
        location ~* "\.(old|orig|original|php#|php~|php_bak|save|swo|aspx?|tpl|sh|bash|bak?|cfg|cgi|dll|exe|git|hg|ini|jsp|log|mdb|out|sql|svn|swp|tar|rdf)$" {
		deny all;
        }
        location ~* "(eval\()" {
		deny all;
        }
        location ~* "(127\.0\.0\.1)" {
		deny all;
        }
        location ~* "([a-z0-9]{2000})" {
		deny all;
        }
        location ~* "(javascript\:)(.*)(\;)" {
		deny all;
        }
        location ~* "(base64_encode)(.*)(\()" {
		deny all;
        }
        location ~* "(GLOBALS|REQUEST)(=|\[|%)" {
		deny all;
        }
        location ~* "(<|%3C).*script.*(>|%3)" {
		deny all;
        }
        location ~ "(\\|\.\.\.|\.\./|~|`|<|>|\|)" {
		deny all;
        }
        location ~* "(boot\.ini|etc/passwd|self/environ)" {
		deny all;
        }
        location ~* "(thumbs?(_editor|open)?|tim(thumb)?)\.php" {
		deny all;
        }
        location ~* "(\'|\")(.*)(drop|insert|md5|select|union)" {
		deny all;
        }
        location ~* "(https?|ftp|php):/" {
		deny all;
        }
        location ~* "(=\\\'|=\\%27|/\\\'/?)\." {
		deny all;
        }
        location ~ "(\{0\}|\(/\(|\.\.\.|\+\+\+|\\\"\\\")" {
		deny all;
        }
       location ~ "(~|`|<|>|:|;|%|\\|\s|\{|\}|\[|\]|\|)" {
		deny all;
        }
        location ~* "/(=|\$&|_mm|(wp-)?config\.|cgi-|etc/passwd|muieblack)" {
		deny all;
        }
        location ~* "(&pws=0|_vti_|\(null\)|\{\$itemURL\}|echo(.*)kae|etc/passwd|eval\(|self/environ)" {
		deny all;
        }
        location ~* "/(^$|mobiquo|phpinfo|shell|sqlpatch|thumb|thumb_editor|thumbopen|timthumb|webshell|config|settings|configuration)\.php" {
		deny all;
        }
        location ~ /\.ht {
                deny all;
        }
        location ~ \.(env|json|config.js|md|gitignore|gitattributes|lock)$ {
                deny all;
        }
        location ~ /\.(?!well-known).* {
                deny all;
        }

